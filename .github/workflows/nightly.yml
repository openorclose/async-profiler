name: Publish Nightly Builds


on:
  push:
    branches:
      - nightly_build_test

jobs:
  build-test-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runson: macos-latest # mac
            archive: async-profiler-3.0-macos-arm64.zip

          - runson: codebuild-test-x86-${{ github.run_id }}-${{ github.run_attempt }}
            archive: async-profiler-3.0-linux-x64.tar.gz

          - runson: codebuild-test-${{ github.run_id }}-${{ github.run_attempt }} # linux arm
            archive: async-profiler-3.0-linux-arm64.tar.gz
    runs-on: ${{ matrix.runson }}
    container:
      image: ${{ matrix.image }} # will be null except for linux x64
      options: --privileged # needed in order to use sysctl
    steps:
      - name: Test
        run: |
          ls -la $CODEBUILD_SRC_DIR/actions-runner/externals/node20/bin/
          patchelf --set-interpreter /opt/glibc-2.28/lib/ld-linux-x86-64.so.2 --set-rpath /opt/glibc-2.28/lib/:/lib/$(arch)-linux-gnu/:/usr/lib/$(arch)-linux-gnu/ $CODEBUILD_SRC_DIR/actions-runner/externals/node20/bin/node
          # ls -la $CODEBUILD_SRC_DIR/actions-runner/externals/node20/bin/
          # sudo ln -s /usr/local/lib/node/node-v20.17.0-linux-x64/bin/node $CODEBUILD_SRC_DIR/actions-runner/externals/node20/bin/node
          # ls -la $CODEBUILD_SRC_DIR/actions-runner/externals/node20/bin/
      - uses: actions/checkout@v4
      - name: Build and Test
        run: |
          if [[ "${{ matrix.runson }}" != "macos-latest" ]]; then # configuration needed only for linux
            sudo sysctl kernel.perf_event_paranoid=1 && sudo sysctl kernel.kptr_restrict=0 # allow tests to execute
            make CC=/usr/local/musl/bin/musl-gcc release -j
          else
            make release 
            ls
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}-${{ github.sha }}
          path: ${{ matrix.archive }}
      - uses: actions/github-script@v7
        id: delete-previous-and-upload-to-release
        with:
          result-encoding: string
          script: |
            const commonOptions = {
              owner: "openorclose",
              repo: "async-profiler",
              release_id: 176384274,
            };
            const assets = await github.rest.repos.listReleaseAssets(commonOptions);
            if (assets.status !== 200) {
              throw new Error("Unable to get list of assets from release!");
            }
            await Promise.all(assets.data
              .filter(({name}) => name === "${{ matrix.archive }}")
              .map(({id}) => github.rest.repos.deleteReleaseAsset({...commonOptions, asset_id: id})));
            github.rest.repos.uploadReleaseAsset({
              ...commonOptions,
              name: "${{ matrix.archive }}",
              data: "@${{ matrix.archive }}",
            });
